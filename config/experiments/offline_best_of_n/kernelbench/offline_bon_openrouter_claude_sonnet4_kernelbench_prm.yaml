# @package _global_
# Run: python scripts/run_tts_eval.py --config-path=../config --config-name=experiments/offline_best_of_n/kernelbench/offline_bon_openrouter_claude_sonnet4_kernelbench_prm
# Offline Best-of-N for KernelBench using OpenRouter API with linguistic step boundaries
# Uses prm scorer for step evaluation
#
# Environment variable required: OPENROUTER_API_KEY

defaults:
  - /config
  - /model/openrouter
  - /generation/default
  - /system/default
  - /strategy/offline_bon
  - /scorer/prm
  - _self_

# Run naming
run_name: "offline_bon_openrouter_claude_sonnet4_kernelbench_prm_seed${system.seed}_${now:%H-%M-%S}"

# Main configuration
verbose: true
report_to: wandb
wandb_project: llm-tts-kernelbench
wandb_group: "offline_bon_openrouter_claude_sonnet4_kernelbench_prm"

# Model configuration (OpenRouter API)
model:
  type: "openai_api"
  provider: openrouter
  model_path: "anthropic/claude-sonnet-4"
  api_key: null  # Set via OPENROUTER_API_KEY env var
  supports_logprobs: true
  prefill_mode: false
  max_context_budget: 128000

# System configuration
system:
  device: cpu
  seed: 0

# Generation configuration
generation:
  max_new_tokens: 32768
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  batch_size: 1
  max_length: 65536

# Strategy - Offline Best-of-N with linguistic step boundaries
strategy:
  type: offline_best_of_n
  num_trajectories: 32  # Number of candidate generations per problem
  max_step_tokens: 500
  max_steps: 100

# PRM scorer configuration (local vLLM backend)
scorer:
  type: prm
  model_path: "Qwen/Qwen2.5-Math-PRM-7B"
  device: cuda:0
  batch_size: 1
  use_vllm: true
  gpu_memory_utilization: 0.9
  prm_max_tokens: 4000

# Dataset configuration - KernelBench
dataset:
  data_name: "kernelbench"
  dataset_path: "ai-nikolai/KernelBench"
  dataset_split: "level_1"  # Options: level_1, level_2, level_3
  subset: null
  offset: 0
  question_field: "question"  # KernelAct loader provides correct prompt format
  answer_field: "answer"  # Reference PyTorch implementation
  answer_format: "code"
  prompt_file: null  # KernelAct API provides correct prompt format
  # KernelBench-specific settings
  level: 1  # Dataset level (1, 2, or 3)
  prompt_type: "improve"  # KernelAct prompt type: "improve", "kernelbench", "normal"
  trial: 1  # Trial number for TTS iteration

# Evaluation configuration (KernelBench uses custom evaluation)
evaluation:
  evaluators: []
  batch_evaluators: []
